<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mega Digital Studios — Premium Photography · Port Blair, Andaman</title>
<meta name="description" content="Mega Digital Studios — Port Blair's finest photography studio. Weddings, portraits, drone shoots, maternity, fashion & commercial photography across the Andaman & Nicobar Islands. Rated 4.7★. Available 24/7."/>
<meta name="keywords" content="photography studio Port Blair, wedding photographer Andaman, drone photography Andaman Islands, Mega Digital Studios Bambooflat, portrait photographer Andaman"/>
<meta property="og:title" content="Mega Digital Studios | Premium Photography – Port Blair, Andaman"/>
<meta property="og:description" content="Where every frame becomes a legacy. Award-winning photography across the Andaman Islands. Rated 4.7 stars."/>
<meta property="og:type" content="website"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200;1,9..144,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#050505;--void2:#0d0d0d;--void3:#161616;--void4:#1f1f1f;--void5:#282828;
  --gold:#c4974a;--gold2:#d4aa64;--gold3:#e8c87e;
  --cream:#f4eedd;--fog:#888;--mist:#b0a898;
  --fh:'Fraunces',Georgia,serif;--fb:'Outfit',sans-serif;
  --eout:cubic-bezier(0.16,1,0.3,1);--einout:cubic-bezier(0.87,0,0.13,1);
}
html{font-size:16px;overflow-x:hidden;scroll-behavior:smooth}
body{background:var(--void);color:var(--cream);font-family:var(--fb);font-weight:300;overflow-x:hidden;cursor:none}
::selection{background:var(--gold);color:var(--void)}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:var(--gold)}
img{display:block;max-width:100%}a{text-decoration:none;color:inherit}
button{font-family:var(--fb);cursor:none;border:none;background:none}
@media(hover:none){body{cursor:auto}button{cursor:pointer}}

/* ══════════════════════════════════════════
   GRAIN
══════════════════════════════════════════ */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;animation:grain .12s steps(1) infinite}
@keyframes grain{
  0%{background-position:0 0}10%{background-position:-5% -10%}20%{background-position:-15% 5%}
  30%{background-position:7% -25%}40%{background-position:-5% 25%}50%{background-position:-15% 10%}
  60%{background-position:15% 0}70%{background-position:0 15%}80%{background-position:3% 35%}
  90%{background-position:-10% 10%}100%{background-position:0 0}
}

/* ══════════════════════════════════════════
   CURSOR
══════════════════════════════════════════ */
.cur-dot,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9998;top:0;left:0;transform:translate(-50%,-50%)}
.cur-dot{width:5px;height:5px;background:var(--gold2)}
.cur-ring{width:36px;height:36px;border:1px solid rgba(196,151,74,.4);
  transition:width .3s var(--eout),height .3s var(--eout),border-color .3s,background .3s}
.cur-ring.expand{width:64px;height:64px;border-color:rgba(196,151,74,.7);background:rgba(196,151,74,.05)}
.cur-ring.shrink{width:10px;height:10px;background:rgba(196,151,74,.35);border-color:transparent}
@media(hover:none){.cur-dot,.cur-ring{display:none}body,button{cursor:auto}}

/* ══════════════════════════════════════════
   LOADER
══════════════════════════════════════════ */
#loader{position:fixed;inset:0;z-index:9500;background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.ld-logo{font-family:var(--fh);font-weight:200;font-size:1.8rem;letter-spacing:.1em;
  display:flex;gap:.2rem;overflow:hidden}
.ld-logo span{display:inline-block;opacity:0;transform:translateY(60px)}
.ld-logo em{font-style:italic;color:var(--gold2)}
.ld-bar-bg{width:140px;height:1px;background:rgba(255,255,255,.06)}
.ld-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold3))}
.ld-pct{font-size:.62rem;letter-spacing:.3em;color:var(--fog)}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
#nav{position:fixed;top:0;left:0;right:0;z-index:700;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.8rem 4.5rem;transition:padding .4s var(--eout)}
#nav::after{content:'';position:absolute;inset:0;background:rgba(5,5,5,0);
  backdrop-filter:blur(0px);transition:background .5s,backdrop-filter .5s;z-index:-1;
  border-bottom:1px solid transparent;transition:all .4s}
#nav.stuck{padding:1rem 4.5rem}
#nav.stuck::after{background:rgba(5,5,5,.95);backdrop-filter:blur(20px);border-bottom-color:rgba(196,151,74,.1)}
.nav-brand{font-family:var(--fh);font-weight:300;font-size:1.38rem;letter-spacing:.04em;color:var(--cream)}
.nav-brand em{font-style:italic;color:var(--gold2)}
.nav-links{display:flex;gap:2.8rem;list-style:none}
.nav-links a{font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fog);
  position:relative;transition:color .3s}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:50%;right:50%;height:1px;
  background:var(--gold);transition:left .35s var(--eout),right .35s var(--eout)}
.nav-links a:hover{color:var(--cream)}
.nav-links a:hover::after{left:0;right:0}
.nav-cta{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid rgba(196,151,74,.45);color:var(--gold);padding:.52rem 1.4rem;
  transition:all .3s;display:inline-block}
.nav-cta:hover{background:var(--gold);color:var(--void);border-color:var(--gold)}
.ham{display:none;flex-direction:column;gap:5px;padding:4px}
.ham span{display:block;height:1.5px;background:var(--cream);transition:.3s;width:22px}
.ham span:nth-child(2){width:14px}.ham span:nth-child(3){width:18px}
.ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);width:22px}
.ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);width:22px}
.mob-menu{display:none;position:fixed;inset:0;z-index:690;background:rgba(5,5,5,.98);
  flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;
  transform:translateY(-100%);transition:transform .7s var(--eout)}
.mob-menu.show{display:flex;transform:translateY(0)}
.mob-menu a{font-family:var(--fh);font-size:2.8rem;font-weight:200;color:var(--cream);transition:color .3s}
.mob-menu a:hover{color:var(--gold)}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
#hero{position:relative;height:100vh;min-height:700px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1537633552985-df8429e8048b?w=1920&q=90') center/cover no-repeat;
  will-change:transform}
.hero-overlay{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(5,5,5,1) 0%,rgba(5,5,5,.55) 38%,rgba(5,5,5,.2) 65%,rgba(5,5,5,.45) 100%)}
.hero-side{position:absolute;right:2.2rem;top:50%;transform:translateY(-50%) rotate(90deg) translateX(-50%);
  font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:var(--fog);white-space:nowrap}
.hero-inner{position:relative;z-index:2;padding:0 4.5rem 5rem;max-width:1100px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.9rem;
  font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--gold);opacity:.55}
.hero-h1{font-family:var(--fh);font-weight:200;
  font-size:clamp(3.2rem,9vw,8.8rem);line-height:.93;letter-spacing:-.025em;overflow:hidden}
.hero-h1 .ln{display:block;overflow:hidden}.hero-h1 .wd{display:inline-block;will-change:transform}
.hero-h1 em{font-style:italic;color:var(--gold2)}
.hero-bottom{display:flex;align-items:flex-end;justify-content:space-between;margin-top:3rem;gap:3rem;flex-wrap:wrap}
.hero-sub{font-size:clamp(.8rem,1.2vw,.96rem);color:var(--mist);max-width:360px;line-height:1.8;overflow:hidden}
.hero-sub-in{display:block}
.hero-btns{display:flex;gap:1.2rem;align-items:center;flex-shrink:0}
.btn-primary{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:.7rem;
  font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
  background:var(--gold);color:var(--void);padding:.88rem 2.2rem;font-weight:500}
.btn-primary::before{content:'';position:absolute;inset:0;background:var(--gold3);
  transform:scaleX(0);transform-origin:left;transition:transform .45s var(--eout)}
.btn-primary:hover::before{transform:scaleX(1)}
.btn-primary span{position:relative;z-index:1}
.btn-secondary{display:inline-block;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
  border:1px solid rgba(244,238,221,.25);color:var(--cream);padding:.88rem 2.2rem;
  transition:border-color .3s,background .3s}
.btn-secondary:hover{border-color:var(--cream);background:rgba(244,238,221,.04)}
.hero-scroll{position:absolute;bottom:2.5rem;right:4.5rem;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  font-size:.54rem;letter-spacing:.25em;text-transform:uppercase;color:var(--fog)}
.hero-scroll-bar{width:1px;height:56px;background:linear-gradient(to bottom,var(--gold),transparent);
  animation:scrollBar 2s ease-in-out infinite}
@keyframes scrollBar{0%,100%{opacity:.4;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.18)}}

/* ══════════════════════════════════════════
   MARQUEE
══════════════════════════════════════════ */
.mq-wrap{overflow:hidden;padding:1.2rem 0;background:var(--void2);
  border-top:1px solid rgba(196,151,74,.09);border-bottom:1px solid rgba(196,151,74,.09)}
.mq-track{display:flex;width:max-content;animation:mq 30s linear infinite}
.mq-track span{font-family:var(--fh);font-style:italic;font-weight:200;font-size:1rem;
  color:var(--fog);white-space:nowrap;padding:0 2.5rem}
.mq-track span b{color:var(--gold);font-style:normal;font-weight:300;padding:0 .4rem}
@keyframes mq{to{transform:translateX(-50%)}}

/* ══════════════════════════════════════════
   SECTION SHARED
══════════════════════════════════════════ */
.sec{padding:9rem 4.5rem}
.s-tag{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.8rem}
.s-h{font-family:var(--fh);font-weight:200;font-size:clamp(2rem,4.5vw,3.7rem);line-height:1.06;color:var(--cream)}
.s-h em{font-style:italic;color:var(--gold2)}
.s-rule{width:46px;height:1px;background:linear-gradient(to right,var(--gold),transparent);margin:1.3rem 0}
.s-rule.c{margin-left:auto;margin-right:auto}
.s-desc{font-size:.88rem;color:var(--mist);line-height:1.9;max-width:500px;font-weight:300}
.s-hd{max-width:1280px;margin:0 auto 4.5rem}
.s-hd.ctr{text-align:center}.s-hd.ctr .s-desc{margin:0 auto}

/* ══════════════════════════════════════════
   PORTFOLIO (HORIZONTAL SCROLL)
══════════════════════════════════════════ */
#portfolio{background:var(--void2)}
.port-intro{padding:7rem 4.5rem 2rem;max-width:1280px;margin:0 auto}
.port-hint{display:flex;align-items:center;gap:.8rem;margin-top:1.5rem;
  font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fog)}
.port-arrow-ic{color:var(--gold);font-size:.9rem;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
#portOuter{height:500vh;position:relative;background:var(--void2)}
#portSticky{position:sticky;top:0;height:100vh;overflow:hidden;display:flex;align-items:center}
#portTrack{display:flex;gap:1.8rem;padding:0 4.5rem;will-change:transform}
.pc{position:relative;flex-shrink:0;overflow:hidden;cursor:pointer}
.pc:nth-child(1){width:55vw;height:74vh}
.pc:nth-child(2){width:33vw;height:52vh;margin-top:11vh}
.pc:nth-child(3){width:40vw;height:64vh}
.pc:nth-child(4){width:27vw;height:48vh;margin-top:16vh}
.pc:nth-child(5){width:46vw;height:68vh;margin-top:-4vh}
.pc:nth-child(6){width:30vw;height:52vh;margin-top:10vh}
.pc:nth-child(7){width:38vw;height:58vh}
.pc img{width:100%;height:100%;object-fit:cover;transform:scale(1.1);
  filter:brightness(.72) saturate(.78);transition:transform .9s var(--eout),filter .8s}
.pc:hover img{transform:scale(1.01);filter:brightness(.9) saturate(1)}
.pc-ol{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,5,.88) 0%,transparent 45%);
  opacity:0;transition:opacity .35s;display:flex;align-items:flex-end;padding:1.8rem 2rem}
.pc:hover .pc-ol{opacity:1}
.pc-info span{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.3rem}
.pc-info h4{font-family:var(--fh);font-size:1.3rem;font-weight:300;color:var(--cream)}
.pc-n{position:absolute;top:1rem;left:1.2rem;font-size:.55rem;letter-spacing:.15em;color:rgba(244,238,221,.35)}

/* ══════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════ */
.lb{display:none;position:fixed;inset:0;z-index:8500;background:rgba(2,2,2,.96);
  align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.lb.on{display:flex}
.lb img{max-width:88vw;max-height:80vh;object-fit:contain;border:1px solid rgba(196,151,74,.12)}
.lb-cap{font-family:var(--fh);font-style:italic;font-size:1rem;font-weight:200;color:var(--fog)}
.lb-x{position:absolute;top:1.8rem;right:1.8rem;color:var(--mist);font-size:2rem;transition:color .3s}
.lb-x:hover{color:var(--gold)}

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
.stats-bar{padding:5rem 4.5rem;background:var(--void3);
  border-top:1px solid rgba(196,151,74,.1);border-bottom:1px solid rgba(196,151,74,.1)}
.stats-inner{max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);text-align:center}
.stat{padding:2rem;position:relative}
.stat::after{content:'';position:absolute;right:0;top:20%;bottom:20%;width:1px;background:rgba(196,151,74,.08)}
.stat:last-child::after{display:none}
.s-big{font-family:var(--fh);font-weight:200;font-size:clamp(2.8rem,4.5vw,4.8rem);
  color:var(--gold);line-height:1;display:block;margin-bottom:.5rem}
.s-lbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--fog)}

/* ══════════════════════════════════════════
   SERVICES
══════════════════════════════════════════ */
#services{background:var(--void)}
.svc-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:2px}
.svc-big{grid-row:span 2;position:relative;overflow:hidden;min-height:740px}
.svc-sm{position:relative;overflow:hidden;min-height:369px}
.svc-big img,.svc-sm img{width:100%;height:100%;object-fit:cover;
  filter:brightness(.32) saturate(.6);transition:transform 1s var(--eout),filter .9s}
.svc-big:hover img,.svc-sm:hover img{transform:scale(1.05);filter:brightness(.5) saturate(.8)}
.svc-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;
  padding:2.5rem;background:linear-gradient(to top,rgba(5,5,5,.94) 0%,transparent 55%)}
.svc-num{font-size:.58rem;letter-spacing:.2em;color:rgba(196,151,74,.45);margin-bottom:.4rem}
.svc-cat{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.svc-body h3{font-family:var(--fh);font-size:1.65rem;font-weight:300;color:var(--cream);margin-bottom:.4rem}
.svc-body p{font-size:.78rem;color:var(--mist);line-height:1.75;
  max-height:0;overflow:hidden;transition:max-height .55s var(--eout),opacity .45s;opacity:0}
.svc-big:hover .svc-body p,.svc-sm:hover .svc-body p{max-height:100px;opacity:1}
.svc-line{width:0;height:1px;background:var(--gold);margin-top:.8rem;
  transition:width .5s var(--eout)}
.svc-big:hover .svc-line,.svc-sm:hover .svc-line{width:44px}
.svc-extras{max-width:1280px;margin:2px auto 0;
  display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.svc-ex{background:var(--void3);border:1px solid rgba(196,151,74,.05);
  padding:1.8rem 2rem;position:relative;overflow:hidden;
  transition:border-color .3s,background .3s}
.svc-ex::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--gold);transform:scaleY(0);transform-origin:bottom;transition:transform .4s var(--eout)}
.svc-ex:hover::before{transform:scaleY(1)}
.svc-ex:hover{border-color:rgba(196,151,74,.15);background:var(--void4)}
.svc-ex-ico{font-size:1.4rem;margin-bottom:.6rem}
.svc-ex h4{font-size:.86rem;color:var(--cream);font-weight:400;margin-bottom:.35rem}
.svc-ex p{font-size:.72rem;color:var(--fog);line-height:1.6}

/* ══════════════════════════════════════════
   PROCESS
══════════════════════════════════════════ */
#process{background:var(--void2)}
.proc-grid{max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr)}
.proc-step{padding:3rem 2.5rem;border-right:1px solid rgba(196,151,74,.07);
  position:relative;overflow:hidden;transition:background .4s}
.proc-step:last-child{border-right:none}
.proc-step::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,var(--gold),transparent);
  transform:scaleX(0);transform-origin:left;transition:transform .55s var(--eout)}
.proc-step:hover::after{transform:scaleX(1)}
.proc-step:hover{background:rgba(196,151,74,.025)}
.proc-n{font-family:var(--fh);font-style:italic;font-weight:200;font-size:5rem;
  color:rgba(196,151,74,.1);line-height:1;display:block;margin-bottom:1rem;transition:color .4s}
.proc-step:hover .proc-n{color:rgba(196,151,74,.22)}
.proc-step h4{font-family:var(--fh);font-size:1.18rem;font-weight:300;color:var(--cream);margin-bottom:.8rem}
.proc-step p{font-size:.78rem;color:var(--fog);line-height:1.75}

/* ══════════════════════════════════════════
   PRICING
══════════════════════════════════════════ */
#pricing{background:var(--void)}
.pricing-grid{max-width:1180px;margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(196,151,74,.1)}
.price-card{background:var(--void2);padding:3.2rem 2.5rem;position:relative;overflow:hidden;transition:background .4s}
.price-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform .55s var(--eout)}
.price-card:hover::before,.price-card.feat::before{transform:scaleX(1)}
.price-card.feat{background:linear-gradient(165deg,rgba(196,151,74,.08) 0%,var(--void2) 55%)}
.price-badge{position:absolute;top:0;right:2.2rem;
  background:var(--gold);color:var(--void);font-size:.54rem;letter-spacing:.16em;
  text-transform:uppercase;padding:.28rem .85rem;font-weight:500}
.price-tier{font-size:.58rem;letter-spacing:.26em;text-transform:uppercase;color:var(--fog);display:block;margin-bottom:.6rem}
.price-name{font-family:var(--fh);font-size:1.8rem;font-weight:200;color:var(--cream);margin-bottom:1.5rem}
.price-amt{font-family:var(--fh);font-weight:200;font-size:3.5rem;color:var(--gold);line-height:1;
  display:flex;align-items:flex-start;gap:.15rem}
.price-amt sup{font-size:1.3rem;margin-top:.6rem}
.price-note{font-size:.66rem;color:var(--fog);margin-top:.4rem;margin-bottom:2rem;letter-spacing:.05em}
.price-hr{height:1px;background:rgba(255,255,255,.05);margin:1.5rem 0}
.price-list{list-style:none;display:flex;flex-direction:column;gap:.75rem;margin-bottom:2.
